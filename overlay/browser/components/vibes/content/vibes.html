<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vibes · Lithe</title>
    <link rel="stylesheet" href="vibes.css" />
    <script type="module" src="vibes.mjs"></script>
  </head>
  <body>
    <main aria-labelledby="vibes-title">
      <div class="constellation" aria-hidden="true">
        <span class="trail trail-one"></span>
        <span class="trail trail-two"></span>
        <span class="trail trail-three"></span>
        <span class="site-card card-one"><i></i><i></i><i></i></span>
        <span class="site-card card-two"><i></i><i></i><i></i></span>
        <span class="site-card card-three"><i></i><i></i><i></i></span>
        <span class="wisp">
          <span class="face"><i></i><i></i></span>
          <span class="spark spark-one"></span>
          <span class="spark spark-two"></span>
          <span class="spark spark-three"></span>
        </span>
      </div>
      <p class="eyebrow">Lithe</p>
      <h1 id="vibes-title">Vibes is wandering a little wider</h1>
      <p id="vibes-status" role="status" aria-live="polite">
        Asking DuckDuckGo for a few interesting corners…
      </p>
      <div class="meter" aria-hidden="true"><span></span></div>
      <p class="privacy-note">Your taste profile and classification stay on this device.</p>
    </main>
  </body>
</html>
